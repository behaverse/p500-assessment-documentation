<!DOCTYPE html>
<html>
<head>
    <title>Debug Timeline Loading</title>
</head>
<body>
    <h1>Debug Timeline Loading</h1>
    <button onclick="testLoad()">Test Load OOO Timeline</button>
    <div id="result"></div>
    
    <script>
        async function testLoad() {
            const result = document.getElementById('result');
            result.innerHTML = 'Loading...';
            
            try {
                console.log('Attempting to load ooo_01_timeline_demo.html...');
                const response = await fetch('ooo_01_timeline_demo.html');
                console.log('Response status:', response.status, response.ok);
                
                if (!response.ok) {
                    result.innerHTML = `Failed to fetch: ${response.status} ${response.statusText}`;
                    return;
                }
                
                const content = await response.text();
                console.log('Content length:', content.length);
                result.innerHTML = `Success! Content length: ${content.length} characters`;
                
                // Test the loadTimelineDemo function if it exists
                if (window.loadTimelineDemo) {
                    console.log('Testing loadTimelineDemo function...');
                    const timelineContent = await window.loadTimelineDemo('OOO', 'XCIT_OOO_01');
                    console.log('loadTimelineDemo result:', timelineContent);
                    if (timelineContent) {
                        result.innerHTML += `<br>loadTimelineDemo success! Title: ${timelineContent.title}`;
                    } else {
                        result.innerHTML += `<br>loadTimelineDemo returned null`;
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                result.innerHTML = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
