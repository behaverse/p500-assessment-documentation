XCIT_BM_01_Tutorial:
    RulesTitle: "Complete the pattern."
    GameRules: "You will see a board containing images. But one piece of the board is missing. That piece is presented among a set of other possible pieces below the board. The missing piece completes some pattern on the board, both along the rows and the columns. There is only one piece that completes the pattern, that is, there is only one correct piece among the pieces presented below the board. Your job is to understand the relationships between the images on the board and to find the missing piece. Click on the piece below the board that you think completes the pattern. Respond as fast as you can without making too many errors. Note that you have a limited time to find the missing piece for a given board."
    Job: "Complete the pattern."
    Stimulus: "You will see a board containing images. But one piece of the board is missing. That piece is presented among a set of other possible pieces below the board."
    GenerativeModel: "The missing piece completes some pattern on the board, both along the rows and the columns. There is only one piece that completes the pattern, that is, there is only one correct piece among the pieces presented below the board."
    YourJob: "Your job is to understand the relationships between the images on the board and to find the missing piece."
    Response: "Click on the piece below the board that you think completes the pattern."
    Constraint: "Note that you have a limited time to find the missing piece for a given board."
    GetReady: "Let's do a few examples!"
    TestEnd: "Examples complete!"

