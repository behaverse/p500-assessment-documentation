    GameRules: "You will see numbers appear on the screen, one after the other. In the middle you will see the numbers 357 and a button. Your job is to click the button each time you see the numbers 3, 5 and 7 appear in a row. In other words, click the button whenever you see 7 that was directly preceded by 5, that was directly preceded by 3. In any other case (for example, 7 not preceded by 5 and 3, or any number that is not 7), do not press the button. Respond as fast as you can without making too many errors. To start a trial, click on the button that says \"Ready?\"."
