XCIT_BCS_01_Test:
    RulesTitle: "Figure out the rules."
    GameRules: "You will see a card and several buttons on the screen. Each time you click on a button, a new card will be shown. Your job is to learn which button to click for each card. You will be told after each response whether your choice was correct or not."
    Introduction: "This test has 3 parts and should take about 36 minutes to complete. Each part will be clearly indicated and there will be several breaks along the way. Press OK to start part 1/3."
