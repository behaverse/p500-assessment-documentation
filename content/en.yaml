    Feedback: "You will be told after each response whether your choice was correct or not."
    TerminationRule: "This test contains 64 trials."
    GetReady: "You are now ready for the test.\nPress OK to start."
    TestEnd: "Test complete!"

XCIT_BCS_02_Tutorial:
    RulesTitle: "Sort the cards."
    GameRules: "You will see a card and several buttons on the screen. You will also see the word \"number\", \"symbol\" or \"background\" displayed below the card. Your job is to click on the button that shares with the card the property that is named by the word on the screen. For example, if the card shows two symbols and the word says \"symbol\", click on the button that displays the same symbol as the card even if the number of symbols on the card and the button are different. Respond as fast as you can without making too many errors."
    Introduction: "Press OK to start part 2/3."
    Job: "Sort the cards."
