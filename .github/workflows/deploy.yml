name: Deploy webapp to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Build deployable bundle
        # `make dist` copies webapp/ into ./dist and replaces the
        # webapp/content -> ../content symlink with a real copy of
        # the runtime content (engines.json, timeline_configs, en.yaml,
        # images, OrderedClicks). The Excel master spec and timeline_names
        # are intentionally excluded as they're build-time inputs only.
        run: make dist

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
